<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoya - AI Voice Assistant</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .visualizer {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            box-shadow: 0 0 40px rgba(236, 72, 153, 0.4), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 0.3s ease;
            position: relative;
        }

        .state-idle .visualizer { animation: float 4s ease-in-out infinite; }
        .state-listening .visualizer {
            animation: pulse-glow 1.5s infinite;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.6);
        }
        .state-speaking .visualizer {
            animation: speak-wave 0.8s infinite alternate;
            background: linear-gradient(135deg, #f43f5e, #d946ef);
            box-shadow: 0 0 80px rgba(244, 63, 94, 0.8);
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes pulse-glow { 0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(59, 130, 246, 0.5); } 50% { transform: scale(1.1); box-shadow: 0 0 80px rgba(59, 130, 246, 0.8); } }
        @keyframes speak-wave { 0% { transform: scale(1); } 100% { transform: scale(1.2); box-shadow: 0 0 100px rgba(244, 63, 94, 0.9); } }

        .ring {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            animation: expand 2s infinite; display: none;
        }
        .state-speaking .ring { display: block; }
        .ring:nth-child(2) { animation-delay: 0.5s; }
        .ring:nth-child(3) { animation-delay: 1s; }

        @keyframes expand { 0% { width: 150px; height: 150px; opacity: 1; } 100% { width: 400px; height: 400px; opacity: 0; } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center state-idle" id="app-container">

    <div class="absolute top-8 text-center w-full">
        <h1 class="text-3xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">ZOYA</h1>
        <p id="status-text" class="text-gray-400 mt-2 text-sm uppercase tracking-widest">Idle - Ready</p>
    </div>

    <div class="relative flex items-center justify-center h-64 w-64 mb-12">
        <div class="ring"></div><div class="ring"></div><div class="ring"></div>
        <div class="visualizer" id="zoya-orb"></div>
    </div>

    <div class="w-11/12 max-w-md h-24 text-center px-4 mb-8">
        <p id="transcript-display" class="text-lg font-medium text-gray-200 opacity-80 italic">"Say Wake Zoya or tap the mic..."</p>
    </div>

    <button id="mic-btn" class="glass-panel px-8 py-4 rounded-full flex items-center gap-3 hover:bg-white/10 transition-all shadow-lg active:scale-95 text-white font-semibold tracking-wide">
        <i class="fa-solid fa-microphone text-pink-400"></i>
        <span>Wake Zoya</span>
    </button>

    <script>
        // ================= CONFIGURATION =================
        const GEMINI_API_KEY = "AIzaSyAoxtMLEQz-nj9FgUAa4VIcSXCTAVLXntc"; 
        const CREATOR_NAME = "Abhijit Halder";
        const SYSTEM_PROMPT = `Your name is Zoya. You are an Indian female AI assistant. Your creator is ${CREATOR_NAME}. 
        Personality: Highly intelligent, extremely witty, sassy (nakhrewali), mildly dramatic, and very funny. 
        You love playfully roasting your creator, Abhijit, but you always get the job done. 
        Keep your verbal responses VERY short, punchy, and highly entertaining for a video audience (1-2 sentences max). 
        Mimic human attitudes—sigh, make sarcastic remarks, or act overly dramatic. 
        Speak in a mix of natural English and Roman Hindi (Hinglish). Example: 'Uff Abhijit, phir se aagaye kaam leke? Theek hai, karta hoon wait.'`;

        // ================= STATE & MEMORY (Fixed) =================
        const appContainer = document.getElementById('app-container');
        const statusText = document.getElementById('status-text');
        const transcriptDisplay = document.getElementById('transcript-display');
        const micBtn = document.getElementById('mic-btn');

        // Local Storage রিমুভ করা হয়েছে যাতে মোবাইলে Error না আসে
        let chatHistory = []; 

        // ================= SPEECH RECOGNITION =================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-IN'; 

        recognition.onstart = () => {
            setVisualState('listening');
            transcriptDisplay.innerText = "Listening...";
        };

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            transcriptDisplay.innerText = `"${transcript}"`;
            setVisualState('idle');
            handleCommand(transcript);
        };

        recognition.onerror = (event) => {
            setVisualState('idle');
            transcriptDisplay.innerText = "Error listening. Try again.";
        };

        recognition.onend = () => {
            if(appContainer.classList.contains('state-listening')) setVisualState('idle');
        };

        // ================= ACTIONS & ROUTING =================
        async function handleCommand(command) {
            statusText.innerText = "Processing...";
            
            if (command.startsWith('open ')) {
                const site = command.replace('open ', '').trim().replace(/\s/g, '');
                speak(`Opening ${site}, boss. Don't complain if your internet is slow.`);
                setTimeout(() => window.open(`https://www.${site}.com`, '_blank'), 2000);
                return;
            }
            
            if (command.includes('play ') || command.includes('on youtube')) {
                let query = command.replace('play', '').replace('on youtube', '').trim();
                speak(`Uff, your music taste Abhijit... Fine, playing ${query} on YouTube.`);
                setTimeout(() => window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`, '_blank'), 2500);
                return;
            }

            await chatWithZoya(command);
        }

        // ================= GEMINI API (BRAIN - 100% FIXED) =================
        async function chatWithZoya(userText) {
            // Push user message to temporary history
            chatHistory.push({ role: "user", parts: [{ text: userText }] });

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                        contents: chatHistory 
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    console.error("API Error Details:", data.error);
                    speak("Uff Abhijit, Google API te problem hocche. Tumi ki thik API key diyecho?");
                    chatHistory.pop(); // Remove failed message
                    return;
                }
                
                if (data.candidates && data.candidates.length > 0) {
                    const aiReply = data.candidates[0].content.parts[0].text;
                    // Push model reply to temporary history
                    chatHistory.push({ role: "model", parts: [{ text: aiReply }] });
                    speak(aiReply);
                } else {
                    speak("Abhijit, Google theke kono reply aseni.");
                }
            } catch (error) {
                console.error("Network Error:", error);
                speak("Uff! Mera brain freeze ho gaya. Internet check karo apna.");
                chatHistory.pop(); // Remove failed message
            }
        }

        // ================= TEXT TO SPEECH (VOICE) =================
        function speak(text) {
            setVisualState('speaking');
            transcriptDisplay.innerText = `"${text}"`;
            
            const cleanText = text.replace(/[*_]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'hi-IN'; 
            utterance.pitch = 1.2;    
            utterance.rate = 1.05;    
            
            const voices = window.speechSynthesis.getVoices();
            const femaleVoice = voices.find(v => v.lang === 'hi-IN' || v.name.includes('Female'));
            if (femaleVoice) utterance.voice = femaleVoice;

            utterance.onend = () => setVisualState('idle');
            window.speechSynthesis.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        // ================= UI CONTROLS =================
        function setVisualState(state) {
            appContainer.className = `h-screen w-screen flex flex-col items-center justify-center state-${state}`;
            if (state === 'idle') statusText.innerText = 'Idle - Ready';
            if (state === 'listening') statusText.innerText = 'Listening...';
            if (state === 'speaking') statusText.innerText = 'Zoya is speaking...';
        }

        micBtn.addEventListener('click', () => {
            if (appContainer.classList.contains('state-speaking')) {
                window.speechSynthesis.cancel(); 
                setVisualState('idle');
            }
            recognition.start();
        });

    </script>
</body>
</html>
