<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A-Zone Pro AI</title>
    <!-- Markdown ke HTML e convert korar Library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Ultra Premium Futuristic UI */
        body { margin: 0; padding: 0; font-family: 'Inter', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f172a, #1e1b4b); color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 700px; height: 90vh; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        
        /* Header */
        .header { background: rgba(15, 23, 42, 0.8); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .header-title { font-size: 20px; font-weight: 800; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; color: transparent; letter-spacing: 1px;}
        .clear-btn { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .clear-btn:hover { background: #ef4444; color: white; }

        /* Chat Area */
        .chat-box { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        /* Custom Scrollbar */
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .message { padding: 15px 20px; border-radius: 15px; max-width: 85%; line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease-in-out; }
        .user-msg { background: linear-gradient(135deg, #2563eb, #4f46e5); align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }
        .ai-msg { background: rgba(51, 65, 85, 0.8); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Markdown Styles inside AI Message */
        .ai-msg p { margin: 0 0 10px 0; }
        .ai-msg pre { background: #0f172a; padding: 10px; border-radius: 8px; overflow-x: auto; border: 1px solid #334155; }
        .ai-msg code { font-family: monospace; color: #38bdf8; }
        .ai-msg strong { color: #fff; }
        
        /* Input Area */
        .input-area { display: flex; padding: 20px; background: rgba(15, 23, 42, 0.9); border-top: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; padding: 15px 20px; border-radius: 12px; border: 1px solid #475569; background: rgba(30, 41, 59, 0.5); color: white; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #8b5cf6; box-shadow: 0 0 10px rgba(139, 92, 246, 0.4); background: rgba(30, 41, 59, 0.8); }
        button.send-btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); border: none; padding: 0 25px; margin-left: 15px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }
        button.send-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .typing { display: flex; gap: 5px; align-items: center; padding: 10px 15px; background: transparent; border: none;}
        .dot { width: 8px; height: 8px; background: #8b5cf6; border-radius: 50%; animation: bounce 1.5s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="header-title">A-Zone Pro AI</div>
        <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
    </div>
    <div class="chat-box" id="chatBox">
        <div class="message ai-msg">Hello! Ami A-Zone er official advanced AI assistant. Bolo, kivabe sahajyo korbo?</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask anything, write code, or solve problems..." onkeypress="handleEnter(event)">
        <button class="send-btn" onclick="askAI()">Send</button>
    </div>
</div>

<script>
    let chatHistory = [];

    // System Instructions - AI ke command dewa je se ke
    const systemInstruction = {
        role: "user",
        parts: [{ text: "System Command: You are a highly intelligent, professional, and helpful AI assistant for a premium platform named 'A-Zone'. Always give clear, well-formatted, step-by-step answers. If providing code, explain it briefly." }]
    };

    function handleEnter(e) { if (e.key === 'Enter') askAI(); }

    function clearChat() {
        document.getElementById("chatBox").innerHTML = '<div class="message ai-msg">Chat history cleared. Notun vabe ki jante chao?</div>';
        chatHistory = []; // Memory reset kora
    }

    async function askAI() {
        const inputField = document.getElementById("userInput");
        const prompt = inputField.value.trim();
        if (!prompt) return;

        addMessageToUI(prompt, "user-msg", false);
        inputField.value = "";

        const typingId = showTypingIndicator();

        // EKHANE TOMAR ASOL API KEY DIBE
        const apiKey = "AIzaSyDRTlWFLwtfHLq0y-TySGbGSVlnDyc8xu8"; 
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        // Prepare context
        let currentHistory = [...chatHistory, { role: "user", parts: [{ text: prompt }] }];
        
        // Pothome system instruction add korchi (ekbar i pathabo)
        let requestContents = chatHistory.length === 0 ? [systemInstruction, ...currentHistory] : currentHistory;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: requestContents })
            });

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            chatHistory.push({ role: "user", parts: [{ text: prompt }] });
            chatHistory.push({ role: "model", parts: [{ text: aiText }] });

            document.getElementById(typingId).remove();
            addMessageToUI(aiText, "ai-msg", true); // true = use Markdown

        } catch (error) {
            document.getElementById(typingId).remove();
            addMessageToUI("Error: Internet connection ba API Key check koro.", "ai-msg", false);
        }
    }

    function showTypingIndicator() {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `typing`;
        msgDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        const uniqueId = "typing-" + Date.now();
        msgDiv.id = uniqueId;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return uniqueId;
    }

    function addMessageToUI(text, className, useMarkdown) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        
        // Jodi Markdown use korte hoy (sudhu AI er khetrye)
        if (useMarkdown) {
            msgDiv.innerHTML = marked.parse(text);
        } else {
            msgDiv.innerText = text;
        }

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
